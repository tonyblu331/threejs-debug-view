name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm verify

      - name: Pack npm package
        id: pack
        shell: bash
        run: |
          package_file="$(pnpm pack --pack-destination . | tail -n 1)"
          echo "package_file=${package_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.package_file }}
          generate_release_notes: true

      - name: Configure GitHub Packages package metadata
        run: |
          npm pkg set name=@tonyblu331/threejs-debug-view
          npm pkg set publishConfig.registry=https://npm.pkg.github.com

      - name: Pack GitHub Packages package
        id: pack-github
        shell: bash
        run: |
          package_file="$(pnpm pack --pack-destination . | tail -n 1)"
          echo "package_file=${package_file}" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: |
          npm config set @tonyblu331:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          npm publish "${{ steps.pack-github.outputs.package_file }}" --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
